<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GoClear Form Detection</title>
</head>
<body>
  <form name="goclear-got-funding" method="POST" data-netlify="true" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="goclear-got-funding" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <select name="business_owner">
      <option>Yes</option>
      <option>Not yet</option>
      <option>Planning to start</option>
    </select>
    <select name="interest">
      <option>Improve my credit</option>
      <option>Start a business</option>
      <option>Grow my business</option>
      <option>Get funding-ready</option>
      <option>Both credit and business funding</option>
      <option>Not sure yet</option>
    </select>
    <input type="checkbox" name="consent" />
  </form>
</body>
</html>
